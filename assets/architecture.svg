<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" />

  <!-- Styles -->
  <style>
    .box { fill: #ffffff; stroke: #333; stroke-width: 2; }
    .label { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
    .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
    .group-box { fill: none; stroke: #999; stroke-dasharray: 5,5; stroke-width: 2; }
    .group-label { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- User / CLI -->
  <rect x="350" y="20" width="100" height="50" class="box" rx="5" />
  <text x="400" y="50" class="title">User / CLI</text>

  <!-- Backend Group -->
  <rect x="150" y="100" width="500" height="120" class="group-box" rx="10" />
  <text x="220" y="120" class="group-label">Backend (Python)</text>

  <rect x="170" y="140" width="100" height="40" class="box" fill="#e3f2fd" />
  <text x="220" y="165" class="label">DID System</text>

  <rect x="290" y="140" width="100" height="40" class="box" fill="#e3f2fd" />
  <text x="340" y="165" class="label">Project Mgmt</text>

  <rect x="410" y="140" width="100" height="40" class="box" fill="#e3f2fd" />
  <text x="460" y="165" class="label">Contributions</text>

  <rect x="530" y="140" width="100" height="40" class="box" fill="#e3f2fd" />
  <text x="580" y="165" class="label">P2P Msg</text>

  <!-- Blockchain Group -->
  <rect x="50" y="300" width="300" height="150" class="group-box" rx="10" />
  <text x="120" y="320" class="group-label">Blockchain (Ganache)</text>

  <rect x="80" y="350" width="110" height="60" class="box" fill="#fff9c4" />
  <text x="135" y="375" class="label">Smart Contract</text>
  <text x="135" y="395" class="title">DIDRegistry</text>

  <rect x="210" y="350" width="110" height="60" class="box" fill="#fff9c4" />
  <text x="265" y="375" class="label">Smart Contract</text>
  <text x="265" y="395" class="title">AegisToken</text>

  <!-- IPFS Group -->
  <rect x="450" y="300" width="300" height="150" class="group-box" rx="10" />
  <text x="520" y="320" class="group-label">Decentralized Storage (IPFS)</text>

  <rect x="500" y="350" width="200" height="60" class="box" fill="#e0f2f1" />
  <text x="600" y="375" class="label">IPFS Network</text>
  <text x="600" y="395" class="title">Files & Metadata</text>

  <!-- Arrows -->
  <!-- CLI to Backend Components -->
  <line x1="400" y1="70" x2="400" y2="100" class="arrow" />

  <!-- Backend to Blockchain -->
  <line x1="220" y1="180" x2="135" y2="350" class="arrow" />
  <line x1="340" y1="180" x2="265" y2="350" class="arrow" />

  <!-- Backend to IPFS -->
  <line x1="340" y1="180" x2="550" y2="350" class="arrow" />
  <line x1="460" y1="180" x2="650" y2="350" class="arrow" />

</svg>
