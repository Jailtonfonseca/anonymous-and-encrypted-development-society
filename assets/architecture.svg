<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="3" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Arrowhead Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a" />
    </marker>

    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e1f5fe" />
      <stop offset="100%" style="stop-color:#b3e5fc" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4" />
      <stop offset="100%" style="stop-color:#fff176" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1" />
      <stop offset="100%" style="stop-color:#b2dfdb" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fcfcfc" />

  <!-- Styles -->
  <style>
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; text-anchor: middle; fill: #37474f; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; fill: #263238; }
    .group-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #78909c; font-weight: 600; }
    .path-line { fill: none; stroke: #546e7a; stroke-width: 2; marker-end: url(#arrowhead); }
    .group-box { fill: #f5f5f5; stroke: #cfd8dc; stroke-dasharray: 6,4; stroke-width: 2; rx: 10; ry: 10; }
  </style>

  <!-- --- NODES --- -->

  <!-- CLI -->
  <g transform="translate(350, 20)" filter="url(#dropShadow)">
    <rect width="100" height="50" rx="8" fill="#eceff1" stroke="#455a64" stroke-width="2" />
    <text x="50" y="30" class="title">User / CLI</text>
  </g>

  <!-- Backend Group -->
  <rect x="130" y="100" width="540" height="130" class="group-box" />
  <text x="145" y="120" class="group-label">Backend (Python)</text>

  <g transform="translate(150, 140)" filter="url(#dropShadow)">
    <rect width="110" height="50" rx="6" fill="url(#blueGrad)" stroke="#0288d1" stroke-width="1.5" />
    <text x="55" y="30" class="label">DID System</text>
  </g>

  <g transform="translate(280, 140)" filter="url(#dropShadow)">
    <rect width="110" height="50" rx="6" fill="url(#blueGrad)" stroke="#0288d1" stroke-width="1.5" />
    <text x="55" y="30" class="label">Project Mgmt</text>
  </g>

  <g transform="translate(410, 140)" filter="url(#dropShadow)">
    <rect width="110" height="50" rx="6" fill="url(#blueGrad)" stroke="#0288d1" stroke-width="1.5" />
    <text x="55" y="30" class="label">Contributions</text>
  </g>

  <g transform="translate(540, 140)" filter="url(#dropShadow)">
    <rect width="110" height="50" rx="6" fill="url(#blueGrad)" stroke="#0288d1" stroke-width="1.5" />
    <text x="55" y="30" class="label">P2P Msg</text>
  </g>

  <!-- Blockchain Group -->
  <rect x="50" y="300" width="300" height="150" class="group-box" />
  <text x="70" y="325" class="group-label">Blockchain (Ganache)</text>

  <g transform="translate(80, 350)" filter="url(#dropShadow)">
    <rect width="110" height="70" rx="6" fill="url(#yellowGrad)" stroke="#fbc02d" stroke-width="1.5" />
    <text x="55" y="30" class="label" font-size="12">Smart Contract</text>
    <text x="55" y="50" class="title">DIDRegistry</text>
  </g>

  <g transform="translate(210, 350)" filter="url(#dropShadow)">
    <rect width="110" height="70" rx="6" fill="url(#yellowGrad)" stroke="#fbc02d" stroke-width="1.5" />
    <text x="55" y="30" class="label" font-size="12">Smart Contract</text>
    <text x="55" y="50" class="title">AegisToken</text>
  </g>

  <!-- IPFS Group -->
  <rect x="450" y="300" width="300" height="150" class="group-box" />
  <text x="470" y="325" class="group-label">Decentralized Storage (IPFS)</text>

  <g transform="translate(500, 350)" filter="url(#dropShadow)">
    <rect width="200" height="70" rx="6" fill="url(#tealGrad)" stroke="#00897b" stroke-width="1.5" />
    <text x="100" y="30" class="label">IPFS Network</text>
    <text x="100" y="50" class="title">Files &amp; Metadata</text>
  </g>

  <!-- --- CONNECTIONS (Curved) --- -->

  <!-- CLI to Backend -->
  <path d="M 400 70 C 400 80, 205 80, 205 130" class="path-line" />
  <path d="M 400 70 C 400 80, 335 80, 335 130" class="path-line" />
  <path d="M 400 70 C 400 80, 465 80, 465 130" class="path-line" />
  <path d="M 400 70 C 400 80, 595 80, 595 130" class="path-line" />

  <!-- Backend to Blockchain -->
  <path d="M 205 190 C 205 250, 135 250, 135 340" class="path-line" />
  <path d="M 335 190 C 335 250, 265 250, 265 340" class="path-line" />

  <!-- Backend to IPFS -->
  <path d="M 335 190 C 335 250, 550 250, 550 340" class="path-line" />
  <path d="M 465 190 C 465 250, 650 250, 650 340" class="path-line" />

</svg>
